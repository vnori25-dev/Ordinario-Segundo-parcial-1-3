<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen - Entornos de Programación</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <main class="main-wrapper">

       
        <nav class="nav-container">
            <a href="#" class="nav-item">Inicio</a>
            <a href="#" class="nav-item">Conocenos</a>
           
            <a href="#" class="nav-item tab-productos">Productos</a>
            <a href="#" class="nav-item">Registro</a>
            <a href="#" class="nav-item">Contacto</a>
        </nav>

        
        <div class="card-container">
            
            
            <div class="form-group">
                
                
                <div class="input-row">
                    <label for="web" class="form-label">Web:</label>
                    <input type="text" id="web" class="input-field field-white" value="https://accounts.google.com/SignUp">
                </div>
                
                <div class="input-row">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" id="nombre" class="input-field field-green" value="Juan">
                </div>
                
                <div class="input-row">
                    <label for="apellido" class="form-label">Apellido:</label>
                    <input type="text" id="apellido" class="input-field field-green" value="Pablo">
                </div>

            </div>

            <div class="button-wrapper">
                <button type="button" class="btn-buscar">Buscar</button>
            </div>

        </div>

    </main>

</body>
</html>
